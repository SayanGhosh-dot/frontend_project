<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>stopwatch</title>
    <link rel="stylesheet" href="./style.css">
</head>
<body>
    <div class="stopwatch">
        <div class="displaytime">00:00:00</div>
    </div>
    <div class="buttons">
        <button style="--clr:orange;" id="stop"  class="btn">stop</button>
         <button style="--clr:red;" id="start" class="btn">start</button>
          <button style="--clr:green;" id="reset" class="btn">reset</button>
    </div>
    <script src="script.js"></script>
    
</body>
</html>
